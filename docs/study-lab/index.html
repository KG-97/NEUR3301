<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <meta
      name="description"
      content="Interactive exam-prep app for UWA NEUR3301 Advanced Neuroscience 1: topics, flashcards, quiz mode, mastery tracking, and search. Fully offline after first load."
    />
    <meta name="color-scheme" content="dark light" />
    <title>Synapse — NEUR3301 Study Lab</title>
    <!-- System stack first: avoids loading 20+ Google fonts on a 3.7GB N100 -->
    <style>
      :root {
        --se-font-sans: "DM Sans", "Segoe UI", system-ui, -apple-system, Roboto, "Helvetica Neue", Arial, sans-serif;
        --se-font-serif: "Libre Baskerville", Georgia, "Times New Roman", serif;
        --se-font-mono: "IBM Plex Mono", "Cascadia Code", Consolas, "Courier New", monospace;
      }
      html, body {
        margin: 0;
        min-height: 100%;
        font-family: var(--se-font-sans);
        background: #0b1220;
        color: #e2e8f0;
      }
      #root { min-height: 100vh; }
      /* Soften layout jank before React mounts */
      #synapse-boot {
        position: fixed; inset: 0; display: grid; place-items: center;
        background: #0b1220; color: #94a3b8; font: 14px/1.4 var(--se-font-sans);
        z-index: 50; transition: opacity .25s ease;
      }
      #synapse-boot.hide { opacity: 0; pointer-events: none; }
      #synapse-boot strong { color: #e2e8f0; }
      .se-skip {
        position: fixed; left: 12px; top: -64px; z-index: 60;
        padding: .6rem .9rem; background: #22d3ee; color: #04121a;
        border-radius: .5rem; font: 600 14px/1.2 var(--se-font-sans);
        text-decoration: none; transition: top .15s ease;
      }
      .se-skip:focus { top: 12px; }
      :focus-visible { outline: 3px solid #22d3ee; outline-offset: 3px; }
      @media (prefers-reduced-motion: reduce) { .se-skip { transition: none; } }
    </style>
    <!-- Optional fonts: only if online; page works without them -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=IBM+Plex+Mono:wght@400;500;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600&family=IBM+Plex+Mono:wght@400;500&family=Libre+Baskerville:wght@400;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <link rel="stylesheet" crossorigin href="./assets/index-C3XRwkWz.css" />
  </head>
  <body>
    <a class="se-skip" href="#root">Skip to main content</a>
    <div id="synapse-boot" aria-live="polite">
      <div>
        <strong>Synapse — NEUR3301 Study Lab</strong><br />
        Loading study content…
      </div>
    </div>
    <div id="root" tabindex="-1"></div>
    <script type="module" crossorigin src="./assets/index-BR7I-zAT.js"></script>
    <script src="./assets/synapse-enhance.js" defer></script>
    <script>
      // Hide boot splash once React mounts or after a short fallback.
      (function () {
        function hide() {
          var el = document.getElementById("synapse-boot");
          if (!el) return;
          el.classList.add("hide");
          setTimeout(function () { el.remove(); }, 300);
        }
        var root = document.getElementById("root");
        if (window.MutationObserver && root) {
          var obs = new MutationObserver(function () {
            if (root.childElementCount > 0) {
              obs.disconnect();
              hide();
            }
          });
          obs.observe(root, { childList: true });
        }
        setTimeout(hide, 4000);
      })();
    </script>
  </body>
</html>
