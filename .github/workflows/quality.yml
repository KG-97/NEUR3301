name: Validate course site

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Check static site and course facts
        run: |
          node tests/validate.mjs
          node scripts/check-site.mjs
